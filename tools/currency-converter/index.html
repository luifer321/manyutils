<!DOCTYPE html>
<html lang="en" data-tool="currency-converter">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="currency converter online, convert currency, exchange rate calculator, foreign exchange converter, usd to eur, currency exchange rate">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://manyutils.com/tools/currency-converter/">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Currency Converter Online — Free &amp; Fast | ManyUtils">
  <meta property="og:description" content="Convert between 32 currencies with live exchange rates. USD, EUR, GBP, JPY, and more. Free — no account needed.">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Currency Converter",
    "url": "https://manyutils.com/tools/currency-converter/",
    "description": "Convert between 32 major world currencies using live exchange rates. Fast, free, no account required.",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "All",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "featureList": ["32 major world currencies", "Live exchange rates", "Quick-select popular pairs", "Instant conversion as you type"]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
  <header id="header"></header>
  <div id="top-ad-banner"></div>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8">
      <div class="lg:col-span-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2" data-i18n="tools.currency_converter.name">Currency Converter</h1>
          <p class="text-slate-500 mb-6" data-i18n="tools.currency_converter.description">Convert between 30+ world currencies with live exchange rates.</p>
          <div id="tool-container">
            <div class="space-y-6">

              <!-- Popular pairs -->
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.currency_converter.ui.label_popular_pairs">Popular Pairs</label>
                <div class="flex flex-wrap gap-2">
                  <button class="cc-pair-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-from="USD" data-to="EUR">USD → EUR</button>
                  <button class="cc-pair-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-from="USD" data-to="GBP">USD → GBP</button>
                  <button class="cc-pair-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-from="EUR" data-to="JPY">EUR → JPY</button>
                  <button class="cc-pair-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-from="USD" data-to="BRL">USD → BRL</button>
                </div>
              </div>

              <!-- Amount -->
              <div>
                <label for="cc-amount" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.currency_converter.ui.label_amount">Amount</label>
                <input type="number" id="cc-amount" value="1" min="0" step="any" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-lg font-semibold">
              </div>

              <!-- Currency selectors with swap -->
              <div class="flex items-end gap-3">
                <div class="flex-1">
                  <label for="cc-from" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="common.from">From</label>
                  <div class="relative">
                    <input type="text" id="cc-from-search" placeholder="Search…" class="w-full px-4 py-2 rounded-t-xl border border-slate-200 border-b-0 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm hidden" data-i18n-placeholder="tools.currency_converter.ui.placeholder_search">
                    <select id="cc-from" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm"></select>
                  </div>
                </div>
                <button id="cc-swap-btn" class="p-3 mb-0.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors flex-shrink-0" title="Swap currencies" data-i18n-title="tools.currency_converter.ui.title_swap">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                </button>
                <div class="flex-1">
                  <label for="cc-to" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="common.to">To</label>
                  <div class="relative">
                    <input type="text" id="cc-to-search" placeholder="Search…" class="w-full px-4 py-2 rounded-t-xl border border-slate-200 border-b-0 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm hidden" data-i18n-placeholder="tools.currency_converter.ui.placeholder_search">
                    <select id="cc-to" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm"></select>
                  </div>
                </div>
              </div>

              <!-- Convert button -->
              <button id="cc-convert-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors" data-i18n="common.convert">Convert</button>

              <!-- Result -->
              <div id="cc-result" class="bg-slate-50 border border-slate-200 rounded-xl p-5 hidden">
                <div id="cc-result-amount" class="text-3xl font-bold text-slate-900 mb-1"></div>
                <div id="cc-rate-display" class="text-sm text-slate-500"></div>
              </div>

              <!-- Disclaimer -->
              <p class="text-xs text-slate-400 flex items-center gap-1.5">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
                <span data-i18n="tools.currency_converter.ui.disclaimer">Exchange rates may be approximate. Rates are fetched from a public API and may not reflect real-time market prices.</span>
              </p>
            </div>
          </div>
        </div>

        <div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div id="seo-content"></div>
        </div>
      </div>
      <aside class="mt-8 lg:mt-0 lg:col-span-4">
        <div id="sidebar-content"></div>
      </aside>
    </div>
  </main>
  <div id="bottom-ad-banner"></div>
  <footer id="footer"></footer>
  <script src="/assets/js/tools-registry.js"></script>

</html>
