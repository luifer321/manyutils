<!DOCTYPE html>
<html lang="en" data-tool="color-palette-generator">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator - Free Online Tool | ManyUtils</title>
  <meta name="description" content="Generate harmonious color palettes from any base color. Supports complementary, analogous, triadic, tetradic, and monochromatic color schemes.">
  <link rel="canonical" href="https://manyutils.com/tools/color-palette-generator/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
  <header id="header"></header>
  <div id="top-ad-banner"></div>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8">
      <div class="lg:col-span-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2" data-i18n="tools.color_palette_generator.name">Color Palette Generator</h1>
          <p class="text-slate-500 mb-6" data-i18n="tools.color_palette_generator.description">Generate harmonious color palettes based on color theory.</p>
          <div id="tool-container">

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.color_palette_generator.ui.label_base_color">Base Color</label>
                <div class="flex items-center gap-3">
                  <input type="color" id="base-color" value="#6366f1" class="w-12 h-12 rounded-xl border border-slate-200 cursor-pointer p-0.5 flex-shrink-0">
                  <input type="text" id="hex-input" value="#6366f1" maxlength="7" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none font-mono text-sm">
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.color_palette_generator.ui.label_harmony">Harmony Type</label>
                <select id="harmony-type" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                  <option value="complementary" data-i18n="tools.color_palette_generator.ui.harmony_complementary">Complementary</option>
                  <option value="analogous" data-i18n="tools.color_palette_generator.ui.harmony_analogous">Analogous</option>
                  <option value="triadic" data-i18n="tools.color_palette_generator.ui.harmony_triadic">Triadic</option>
                  <option value="tetradic" data-i18n="tools.color_palette_generator.ui.harmony_tetradic">Tetradic</option>
                  <option value="monochromatic" data-i18n="tools.color_palette_generator.ui.harmony_monochromatic">Monochromatic</option>
                </select>
              </div>
              <div class="flex items-end gap-2">
                <button id="generate-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors flex-1" data-i18n="common.generate">Generate</button>
                <button id="random-color-btn" class="px-3 py-2.5 rounded-xl font-medium text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" title="Random base color">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/></svg>
                </button>
              </div>
            </div>

            <div id="palette-swatches" class="grid grid-cols-5 gap-3 mb-6"></div>

            <div class="mb-6">
              <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.color_palette_generator.ui.label_css_vars">CSS Variables</label>
              <div id="css-vars-output" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm text-slate-700 whitespace-pre select-all"></div>
            </div>

            <div class="flex flex-wrap gap-3">
              <button id="copy-vars-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors" data-i18n="tools.color_palette_generator.ui.btn_copy_vars">Copy CSS Variables</button>
              <button id="shuffle-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-i18n="tools.color_palette_generator.ui.btn_shuffle">Shuffle</button>
            </div>

          </div>
        </div>

        <div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div id="seo-content"></div>
        </div>
      </div>
      <aside class="mt-8 lg:mt-0 lg:col-span-4">
        <div id="sidebar-content"></div>
      </aside>
    </div>
  </main>
  <div id="bottom-ad-banner"></div>
  <footer id="footer"></footer>
  <script src="/assets/js/tools-registry.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/tools/color-palette-generator.js"></script>
</body>
</html>
