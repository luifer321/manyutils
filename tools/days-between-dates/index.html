<!DOCTYPE html>
<html lang="en" data-tool="days-between-dates">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days Between Dates Calculator - Free Online Tool | ManyUtils</title>
  <meta name="description" content="Calculate the exact number of days, weeks, months, business days, and hours between any two dates. Free online date difference calculator.">
  <link rel="canonical" href="https://manyutils.com/tools/days-between-dates/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
  <header id="header"></header>
  <div id="top-ad-banner"></div>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8">
      <div class="lg:col-span-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2" data-i18n="tools.days_between_dates.name">Days Between Dates Calculator</h1>
          <p class="text-slate-500 mb-6" data-i18n="tools.days_between_dates.description">Calculate the exact difference between any two dates.</p>
          <div id="tool-container">
            <div class="space-y-6">

              <!-- Date inputs -->
              <div class="flex items-end gap-3">
                <div class="flex-1">
                  <label for="dbd-start" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.days_between_dates.ui.label_start">Start Date</label>
                  <div class="flex gap-2">
                    <input type="text" id="dbd-start" placeholder="YYYY-MM-DD" autocomplete="off" class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm">
                    <button id="dbd-start-today" class="px-3 py-2.5 rounded-xl text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors flex-shrink-0" data-i18n="common.today">Today</button>
                  </div>
                </div>
                <button id="dbd-swap-btn" class="p-3 mb-0.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors flex-shrink-0" title="Swap dates" data-i18n-title="tools.days_between_dates.ui.title_swap">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                </button>
                <div class="flex-1">
                  <label for="dbd-end" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.days_between_dates.ui.label_end">End Date</label>
                  <div class="flex gap-2">
                    <input type="text" id="dbd-end" placeholder="YYYY-MM-DD" autocomplete="off" class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm">
                    <button id="dbd-end-today" class="px-3 py-2.5 rounded-xl text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors flex-shrink-0" data-i18n="common.today">Today</button>
                  </div>
                </div>
              </div>

              <!-- Calculate button -->
              <button id="dbd-calc-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors" data-i18n="common.calculate">Calculate</button>

              <!-- Status badge -->
              <div id="dbd-status" class="hidden">
                <span id="dbd-status-badge" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium"></span>
              </div>

              <!-- Results grid -->
              <div id="dbd-results" class="hidden">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-days" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_days">Total Days</div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-weeks" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_weeks">Weeks &amp; Days</div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-months" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_months">Months (approx)</div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-business" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_business">Business Days</div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-weekends" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_weekends">Weekend Days</div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center">
                    <div id="dbd-hours" class="text-2xl font-bold text-slate-900">0</div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="tools.days_between_dates.ui.stat_hours">Hours</div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>

        <div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div id="seo-content"></div>
        </div>
      </div>
      <aside class="mt-8 lg:mt-0 lg:col-span-4">
        <div id="sidebar-content"></div>
      </aside>
    </div>
  </main>
  <div id="bottom-ad-banner"></div>
  <footer id="footer"></footer>
  <script src="/assets/js/tools-registry.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="/assets/js/tools/days-between-dates.js"></script>
</body>
</html>
