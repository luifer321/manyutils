<body class="bg-slate-50 font-sans antialiased text-slate-800">
  <header id="header"></header>
  <div id="top-ad-banner"></div>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8">
      <div class="lg:col-span-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
          <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2" data-i18n="tools.image_compressor.name">Image Compressor</h1>
          <p class="text-slate-500 mb-6" data-i18n="tools.image_compressor.description">Compress and resize images with adjustable quality and format options.</p>
          <div id="tool-container">
            <div class="space-y-6">

              <div id="comp-drop" class="drop-zone" data-accept="image/*">
                <div class="flex flex-col items-center justify-center py-10 text-center">
                  <svg class="w-10 h-10 text-slate-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
                  <p class="text-sm font-medium text-slate-600 mb-1" data-i18n="tools.image_compressor.ui.drop_zone">Drag & drop an image here</p>
                  <p class="text-xs text-slate-400">or click to browse — PNG, JPG, WebP, GIF</p>
                </div>
              </div>

              <div id="comp-controls" class="hidden space-y-5">
                <div id="comp-file-info" class="text-sm text-slate-500"></div>

                <div>
                  <div class="flex items-center justify-between mb-1.5">
                    <label for="comp-quality" class="block text-sm font-medium text-slate-700" data-i18n="tools.image_compressor.ui.label_quality">Quality</label>
                    <span id="comp-quality-value" class="text-sm font-semibold text-primary-600 bg-primary-50 px-2.5 py-0.5 rounded-lg">80%</span>
                  </div>
                  <input type="range" id="comp-quality" min="1" max="100" value="80" class="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer accent-primary-500">
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                  <div>
                    <label for="comp-format" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.image_compressor.ui.label_format">Output Format</label>
                    <select id="comp-format" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm">
                      <option value="image/jpeg" data-i18n="tools.image_compressor.ui.fmt_jpeg">JPEG</option>
                      <option value="image/png" data-i18n="tools.image_compressor.ui.fmt_png">PNG</option>
                      <option value="image/webp" selected data-i18n="tools.image_compressor.ui.fmt_webp">WebP</option>
                    </select>
                  </div>
                  <div>
                    <label for="comp-max-width" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.image_compressor.ui.label_max_width">Max Width (px)</label>
                    <input type="number" id="comp-max-width" placeholder="Optional" min="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm" data-i18n-placeholder="tools.image_compressor.ui.placeholder_optional">
                  </div>
                  <div>
                    <label for="comp-max-height" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="tools.image_compressor.ui.label_max_height">Max Height (px)</label>
                    <input type="number" id="comp-max-height" placeholder="Optional" min="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none text-sm" data-i18n-placeholder="tools.image_compressor.ui.placeholder_optional">
                  </div>
                </div>

                <div>
                  <button id="comp-compress-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors" data-i18n="tools.image_compressor.ui.btn_compress">
                    Compress Image
                  </button>
                </div>

                <div id="comp-results" class="hidden space-y-4">
                  <div id="comp-stats" class="grid grid-cols-3 gap-3 text-center">
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
                      <p class="text-xs text-slate-500 mb-0.5">Original</p>
                      <p id="comp-original-size" class="text-sm font-semibold text-slate-900"></p>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3">
                      <p class="text-xs text-slate-500 mb-0.5">Compressed</p>
                      <p id="comp-compressed-size" class="text-sm font-semibold text-slate-900"></p>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
                      <p class="text-xs text-emerald-600 mb-0.5">Savings</p>
                      <p id="comp-savings" class="text-sm font-semibold text-emerald-700"></p>
                    </div>
                  </div>

                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <p class="text-sm font-medium text-slate-700 mb-1.5">Original</p>
                      <div class="border border-slate-200 rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center min-h-[200px]">
                        <canvas id="comp-canvas-original" class="max-w-full h-auto"></canvas>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm font-medium text-slate-700 mb-1.5">Compressed</p>
                      <div class="border border-slate-200 rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center min-h-[200px]">
                        <img id="comp-preview-result" class="max-w-full h-auto" alt="Compressed preview">
                      </div>
                    </div>
                  </div>

                  <div class="flex flex-wrap gap-3">
                    <button id="comp-download-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-primary-500 hover:bg-primary-600 text-white transition-colors" data-i18n="common.download">
                      Download Compressed Image
                    </button>
                    <button id="comp-reset-btn" class="px-5 py-2.5 rounded-xl font-medium text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors" data-i18n="common.reset">
                      Reset
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div id="seo-content"></div>
        </div>

      <aside class="mt-8 lg:mt-0 lg:col-span-4">
